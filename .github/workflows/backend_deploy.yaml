name: Deploy Backend

on:
  workflow_run:
    workflows:
      - Upstream Sync
    types:
      - completed

  push:
    tags:
      - "*"

  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Saat dipicu oleh Upstream Sync, deploy hanya jika workflow tersebut berhasil.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read

    env:
      USE_WORKER_ASSETS: ${{ secrets.USE_WORKER_ASSETS }}
      USE_WORKER_ASSETS_WITH_TELEGRAM: ${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
      BACKEND_USE_MAIL_WASM_PARSER: ${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}

    steps:
      # ============================================================
      # 1. Checkout repository
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 1

      # ============================================================
      # 2. Instal pnpm
      # ============================================================
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      # ============================================================
      # 3. Instal Node.js dan aktifkan pnpm cache
      # Lockfile berada di worker dan frontend, bukan di root.
      # ============================================================
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            worker/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      # ============================================================
      # 4. Validasi struktur repository
      # ============================================================
      - name: Validate repository structure
        shell: bash
        run: |
          set -Eeuo pipefail

          required_files=(
            "worker/package.json"
            "worker/pnpm-lock.yaml"
            "worker/src/worker.ts"
          )

          validation_failed=false

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error::File wajib tidak ditemukan: $file"
              validation_failed=true
            fi
          done

          if [[ "$validation_failed" == "true" ]]; then
            exit 1
          fi

          if [[ "${USE_WORKER_ASSETS:-false}" == "true" ]]; then
            if [[ ! -f "frontend/package.json" ]]; then
              echo "::error::frontend/package.json tidak ditemukan."
              exit 1
            fi

            if [[ ! -f "frontend/pnpm-lock.yaml" ]]; then
              echo "::error::frontend/pnpm-lock.yaml tidak ditemukan."
              exit 1
            fi
          fi

          echo "Struktur repository valid."

      # ============================================================
      # 5. Validasi GitHub Secrets wajib
      # ============================================================
      - name: Validate required secrets
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
        run: |
          set -Eeuo pipefail

          validation_failed=false

          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "::error::Secret CLOUDFLARE_ACCOUNT_ID belum diatur atau kosong."
            validation_failed=true
          fi

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN belum diatur atau kosong."
            validation_failed=true
          fi

          if [[ -z "${WRANGLER_TOML_CONTENT:-}" ]]; then
            echo "::error::Secret BACKEND_TOML belum diatur atau kosong."
            validation_failed=true
          fi

          if [[ "$validation_failed" == "true" ]]; then
            echo "::error::Deployment dihentikan karena secret wajib belum lengkap."
            exit 1
          fi

          echo "Semua secret wajib tersedia."

      # ============================================================
      # 6. Build frontend normal
      # Hanya berjalan jika USE_WORKER_ASSETS=true.
      # ============================================================
      - name: Build normal frontend assets
        if: env.USE_WORKER_ASSETS == 'true' && env.USE_WORKER_ASSETS_WITH_TELEGRAM != 'true'
        shell: bash
        working-directory: frontend
        run: |
          set -Eeuo pipefail

          echo "Installing frontend dependencies..."
          pnpm install --no-frozen-lockfile

          echo "Building normal frontend pages..."
          pnpm build:pages

          if [[ ! -d "dist" ]]; then
            echo "::error::Folder frontend/dist tidak ditemukan setelah proses build."
            exit 1
          fi

          if [[ -z "$(find dist -mindepth 1 -maxdepth 1 -print -quit)" ]]; then
            echo "::error::Folder frontend/dist kosong."
            exit 1
          fi

          echo "Normal frontend assets berhasil dibuat."

      # ============================================================
      # 7. Build frontend Telegram
      # Hanya berjalan jika kedua secret bernilai true.
      # ============================================================
      - name: Build Telegram frontend assets
        if: env.USE_WORKER_ASSETS == 'true' && env.USE_WORKER_ASSETS_WITH_TELEGRAM == 'true'
        shell: bash
        working-directory: frontend
        run: |
          set -Eeuo pipefail

          echo "Installing frontend dependencies..."
          pnpm install --no-frozen-lockfile

          echo "Building Telegram frontend pages..."
          pnpm build:telegram:pages

          if [[ ! -d "dist" ]]; then
            echo "::error::Folder frontend/dist tidak ditemukan setelah proses build."
            exit 1
          fi

          if [[ -z "$(find dist -mindepth 1 -maxdepth 1 -print -quit)" ]]; then
            echo "::error::Folder frontend/dist kosong."
            exit 1
          fi

          echo "Telegram frontend assets berhasil dibuat."

      # ============================================================
      # 8. Buat worker/wrangler.toml dari secret BACKEND_TOML
      # ============================================================
      - name: Create Wrangler configuration
        shell: bash
        working-directory: worker
        env:
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
        run: |
          set -Eeuo pipefail

          if [[ -z "${WRANGLER_TOML_CONTENT:-}" ]]; then
            echo "::error::Secret BACKEND_TOML kosong."
            exit 1
          fi

          # Membatasi izin baca file hanya untuk pengguna saat ini.
          umask 077

          # Menulis konfigurasi tanpa menjalankan karakter khusus Shell.
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml

          if [[ ! -s "wrangler.toml" ]]; then
            echo "::error::worker/wrangler.toml gagal dibuat atau kosong."
            exit 1
          fi

          # Validasi konfigurasi dasar tanpa menampilkan isi secret.
          if ! grep -Eq '^[[:space:]]*name[[:space:]]*=' wrangler.toml; then
            echo "::error::BACKEND_TOML tidak memiliki konfigurasi 'name'."
            exit 1
          fi

          if ! grep -Eq '^[[:space:]]*main[[:space:]]*=' wrangler.toml; then
            echo "::error::BACKEND_TOML tidak memiliki konfigurasi 'main'."
            exit 1
          fi

          if ! grep -Eq '^[[:space:]]*compatibility_date[[:space:]]*=' wrangler.toml; then
            echo "::error::BACKEND_TOML tidak memiliki 'compatibility_date'."
            exit 1
          fi

          if ! grep -Eq '^[[:space:]]*\[\[d1_databases\]\]' wrangler.toml; then
            echo "::warning::Binding D1 tidak ditemukan dalam BACKEND_TOML."
          fi

          echo "worker/wrangler.toml berhasil dibuat dan divalidasi."

      # ============================================================
      # 9. Pastikan konfigurasi assets sesuai
      # ============================================================
      - name: Validate Worker assets configuration
        shell: bash
        working-directory: worker
        run: |
          set -Eeuo pipefail

          if grep -Eq '^[[:space:]]*\[assets\]' wrangler.toml; then
            echo "Konfigurasi Worker Assets ditemukan."

            if [[ ! -d "../frontend/dist" ]]; then
              echo "::error::BACKEND_TOML memakai [assets], tetapi frontend/dist belum tersedia."
              echo "::error::Atur USE_WORKER_ASSETS=true atau hapus bagian [assets] dari BACKEND_TOML."
              exit 1
            fi
          else
            echo "Deployment backend tanpa Worker Assets."
          fi

      # ============================================================
      # 10. Instal dependensi backend
      # ============================================================
      - name: Install backend dependencies
        shell: bash
        working-directory: worker
        run: |
          set -Eeuo pipefail

          echo "Installing backend dependencies..."
          pnpm install --no-frozen-lockfile

          echo "Backend dependencies berhasil dipasang."

      # ============================================================
      # 11. Konfigurasi mail parser WASM opsional
      # ============================================================
      - name: Configure WASM mail parser
        if: env.BACKEND_USE_MAIL_WASM_PARSER == 'true'
        shell: bash
        working-directory: worker
        run: |
          set -Eeuo pipefail

          PATCH_FILE="../.github/config/mail-parser-wasm-worker.patch"

          if [[ ! -f "$PATCH_FILE" ]]; then
            echo "::error::Patch tidak ditemukan: $PATCH_FILE"
            exit 1
          fi

          echo "Installing mail-parser-wasm-worker..."
          pnpm add mail-parser-wasm-worker

          if git apply --check "$PATCH_FILE"; then
            git apply "$PATCH_FILE"
            echo "Patch mail-parser-wasm-worker berhasil diterapkan."
          elif git apply --reverse --check "$PATCH_FILE"; then
            echo "Patch mail-parser-wasm-worker sudah diterapkan."
          else
            echo "::error::Patch mail-parser-wasm-worker tidak dapat diterapkan."
            exit 1
          fi

      # ============================================================
      # 12. Tampilkan versi tool
      # ============================================================
      - name: Display tool versions
        shell: bash
        working-directory: worker
        run: |
          set -Eeuo pipefail

          echo "Node.js version:"
          node --version

          echo "pnpm version:"
          pnpm --version

          echo "Wrangler version:"
          pnpm exec wrangler --version

      # ============================================================
      # 13. Validasi build Worker dengan dry run
      # ============================================================
      - name: Validate Worker build
        shell: bash
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -Eeuo pipefail

          echo "Running Wrangler dry-run build..."
          pnpm run build

          echo "Worker build berhasil divalidasi."

      # ============================================================
      # 14. Deploy Worker ke Cloudflare
      # ============================================================
      - name: Deploy Cloudflare Worker
        shell: bash
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -Eeuo pipefail

          echo "Deploying Cloudflare Worker..."

          # Output tidak disembunyikan supaya error Wrangler terlihat.
          pnpm run deploy

          echo "Cloudflare Worker berhasil di-deploy."

      # ============================================================
      # 15. Bersihkan konfigurasi sementara
      # ============================================================
      - name: Remove temporary Wrangler configuration
        if: always()
        shell: bash
        run: |
          rm -f worker/wrangler.toml
          echo "Temporary Wrangler configuration removed."

      # ============================================================
      # 16. Ringkasan deployment
      # ============================================================
      - name: Deployment summary
        if: success()
        shell: bash
        run: |
          {
            echo "## Backend Deployment"
            echo ""
            echo "- Status: berhasil"
            echo "- Repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- Worker assets: \`${USE_WORKER_ASSETS:-false}\`"
            echo "- Telegram assets: \`${USE_WORKER_ASSETS_WITH_TELEGRAM:-false}\`"
            echo "- WASM parser: \`${BACKEND_USE_MAIL_WASM_PARSER:-false}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ============================================================
      # 17. Ringkasan kegagalan
      # ============================================================
      - name: Failure summary
        if: failure()
        shell: bash
        run: |
          {
            echo "## Backend Deployment"
            echo ""
            echo "- Status: gagal"
            echo "- Repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo ""
            echo "Periksa langkah yang berwarna merah pada log GitHub Actions."
          } >> "$GITHUB_STEP_SUMMARY"
